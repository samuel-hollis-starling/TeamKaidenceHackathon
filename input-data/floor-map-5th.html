d":"Path-49","points":[[3381.54,824.01],[3319.66,824.01],[3319.66,838.69],[3381.54,838.69]]},{"id":"Path-50","points":[[1049.16,2015.78],[1104.3,2015.78],[1104.3,2248.82],[1049.16,2248.82]]},{"id":"Path-51","points":[[2883.37,719.9],[3038.73,719.9],[3038.73,793.66],[2883.37,793.9]]}],"landmarks":[{"type":"WORKPLACETECHBAR","x":2595.06,"y":1586.52},{"type":"KITCHEN","x":1633.16,"y":746.9},{"type":"KITCHEN","x":2725.16,"y":2102.9},{"type":"KITCHEN","x":1334.16,"y":2686.9},{"type":"RECEPTION","x":1129.16,"y":2128.9},{"type":"RESTROOM","x":1903.61,"y":1362.9},{"type":"RESTROOM","x":2031.61,"y":1637.9},{"type":"STAIRS","x":2180.16,"y":2544.9},{"type":"ELEVATOR","x":2197.16,"y":2132.9}],"unavailableSpaces":[{"x":1541.16,"y":2950.9,"rotation":90.0,"shape":"round"},{"x":1037.16,"y":2506.9,"rotation":-103.0,"shape":"round"},{"x":1391.16,"y":1382.9,"rotation":180.0,"shape":"round"},{"x":838.16,"y":2561.81,"rotation":38.0,"shape":"round"},{"x":845.16,"y":2942.81,"rotation":38.0,"shape":"round"},{"x":1111.16,"y":2971.81,"rotation":38.0,"shape":"round"},{"x":1892.66,"y":473.4,"rotation":38.0,"shape":"round"},{"x":2069.66,"y":473.4,"rotation":38.0,"shape":"round"},{"x":1409.66,"y":1216.4,"rotation":38.0,"shape":"round"},{"x":1373.66,"y":1493.4,"rotation":38.0,"shape":"round"},{"x":2579.66,"y":2649.4,"rotation":38.0,"shape":"round"},{"x":2570.66,"y":2844.4,"rotation":38.0,"shape":"round"},{"x":1856.66,"y":685.4,"rotation":38.0,"shape":"round"},{"x":1988.66,"y":685.4,"rotation":38.0,"shape":"round"},{"x":2121.66,"y":685.4,"rotation":38.0,"shape":"round"},{"x":2121.66,"y":821.4,"rotation":38.0,"shape":"round"},{"x":1988.66,"y":821.4,"rotation":38.0,"shape":"round"},{"x":1856.66,"y":821.4,"rotation":38.0,"shape":"round"},{"x":1474.66,"y":911.9,"rotation":-90.0,"shape":"round"},{"x":1913.66,"y":2951.9,"rotation":180.0,"shape":"round"},{"x":3166.16,"y":762.9,"rotation":180.0,"shape":"round"},{"x":1400.66,"y":2961.9,"rotation":-90.0,"shape":"round"},{"x":2676.66,"y":1725.9,"rotation":-103.0,"shape":"round"},{"x":1396.66,"y":2449.9,"rotation":-90.0,"shape":"round"},{"x":2887.66,"y":2950.9,"rotation":-90.0,"shape":"round"},{"x":1709.66,"y":2958.9,"rotation":180.0,"shape":"round"},{"x":2971.66,"y":2488.9,"rotation":-170.0,"shape":"round"},{"x":814.66,"y":2138.9,"rotation":-90.0,"shape":"round"},{"x":2991.66,"y":1664.9,"rotation":-13.0,"shape":"round"},{"x":2090.16,"y":2955.81,"rotation":38.0,"shape":"round"}]};
const COLOURS = {"Agile Workspaces": "#4e79a7", "Banking": "#f28e2b", "Desk Pods": "#e15759", "EMBER": "#76b7b2", "Facilities": "#59a14f", "Red Team": "#edc948", "Tech Central": "#b07aa1", "Tech North A": "#ff9da7", "Tech North B": "#9c755f", "Tech North C": "#bab0ac", "Tech South A": "#d37295", "Tech South B": "#fabfd2", "Tech South B2": "#8cd17d", "Tech South C": "#86bcb6", "Technology - Priority": "#499894", "Workplace Technology": "#f1ce63", "Workplace Technology Workbench": "#a0cbe8"};

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}
window.addEventListener("resize", resize);

// ── View state ────────────────────────────────────────────────────────────────
const VB = MAP.floor.viewBox;
let scale, ox, oy;

function fitToWindow() {
  const margin = 40;
  const sx = (window.innerWidth  - margin * 2) / VB.width;
  const sy = (window.innerHeight - margin * 2) / VB.height;
  scale = Math.min(sx, sy);
  ox = (window.innerWidth  - VB.width  * scale) / 2;
  oy = (window.innerHeight - VB.height * scale) / 2;
}

// ── Coordinate helpers ────────────────────────────────────────────────────────
function tx(x) { return ox + x * scale; }
function ty(y) { return oy + y * scale; }

// ── Hit detection ─────────────────────────────────────────────────────────────
function circleHit(cx, cy, r, mx, my) {
  const dx = cx - mx, dy = cy - my;
  return Math.sqrt(dx * dx + dy * dy) < r;
}

// Ray-casting point-in-polygon
function polyHit(points, mx, my) {
  let inside = false;
  for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
    const xi = points[i][0], yi = points[i][1];
    const xj = points[j][0], yj = points[j][1];
    if ((yi > my) !== (yj > my) && mx < (xj - xi) * (my - yi) / (yj - yi) + xi)
      inside = !inside;
  }
  return inside;
}

function hitTest(mx, my) {
  // Priority: desks → pods → unavailable → landmarks → walls
  for (const d of MAP.spaces.desks)
    if (circleHit(d.x, d.y, 22, mx, my))
      return { kind: "desk", item: d };

  for (const p of MAP.spaces.pods)
    if (circleHit(p.x, p.y, 28, mx, my))
      return { kind: "pod", item: p };

  for (const u of MAP.unavailableSpaces)
    if (circleHit(u.x, u.y, 35, mx, my))
      return { kind: "unavailable", item: u };

  for (const lm of MAP.landmarks)
    if (circleHit(lm.x, lm.y, 14, mx, my))
      return { kind: "landmark", item: lm };

  for (const w of MAP.walls)
    if (polyHit(w.points, mx, my))
      return { kind: "wall", item: w };

  return null;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
let hovered = null;

function drawPolygon(points, fill, stroke, lineWidth = 1) {
  if (!points.length) return;
  ctx.beginPath();
  ctx.moveTo(tx(points[0][0]), ty(points[0][1]));
  for (let i = 1; i < points.length; i++)
    ctx.lineTo(tx(points[i][0]), ty(points[i][1]));
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill;   ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
}

function drawDesk(desk) {
  const isHit = hovered?.kind === "desk" && hovered.item === desk;
  const r = Math.max(16 * scale, 2);
  const colour = COLOURS[desk.neighborhood] ?? "#888";
  ctx.beginPath();
  ctx.arc(tx(desk.x), ty(desk.y), r, 0, Math.PI * 2);
  ctx.fillStyle = isHit ? "#fff" : colour;
  ctx.fill();
  if (isHit) {
    ctx.strokeStyle = colour;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawPod(pod) {
  const isHit = hovered?.kind === "pod" && hovered.item === pod;
  const r = Math.max(20 * scale, 2);
  ctx.beginPath();
  ctx.arc(tx(pod.x), ty(pod.y), r, 0, Math.PI * 2);
  ctx.fillStyle = isHit ? "#fff" : "#6c757d";
  ctx.fill();
  ctx.strokeStyle = isHit ? "#6c757d" : "#aaa";
  ctx.lineWidth = isHit ? 2 : 1;
  ctx.stroke();
}

function drawUnavailable(u, idx) {
  const isHit = hovered?.kind === "unavailable" && hovered.item === u;
  const r = Math.max(30 * scale, 2);
  ctx.beginPath();
  ctx.arc(tx(u.x), ty(u.y), r, 0, Math.PI * 2);
  ctx.fillStyle = isHit ? "#4a4a6a" : "#333344";
  ctx.fill();
  ctx.strokeStyle = isHit ? "#aaa" : "#555";
  ctx.lineWidth = isHit ? 2 : 1;
  ctx.stroke();
}

function drawLandmark(lm) {
  const isHit = hovered?.kind === "landmark" && hovered.item === lm;
  const x = tx(lm.x), y = ty(lm.y);
  const sz = isHit ? 8 : 5;
  ctx.fillStyle = isHit ? "#fff" : "#e9c46a";
  ctx.fillRect(x - sz, y - sz, sz * 2, sz * 2);
  if (isHit) {
    ctx.strokeStyle = "#e9c46a";
    ctx.lineWidth = 2;
    ctx.strokeRect(x - sz, y - sz, sz * 2, sz * 2);
  }
  if (scale > 0.06) {
    ctx.fillStyle = isHit ? "#fff" : "#e9c46a";
    ctx.font = `${Math.round(10 + scale * 10)}px system-ui`;
    ctx.fillText(lm.type, x + sz + 3, y + 4);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#23243a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Walls — highlight hovered wall
  for (const wall of MAP.walls) {
    const isHit = hovered?.kind === "wall" && hovered.item === wall;
    drawPolygon(wall.points,
      isHit ? "#4a4c70" : "#2e3050",
      isHit ? "#8888cc" : "#3a3c5a",
      isHit ? 2 : 1);
  }

  for (const u of MAP.unavailableSpaces) drawUnavailable(u);
  for (const pod of MAP.spaces.pods) drawPod(pod);
  for (const desk of MAP.spaces.desks) drawDesk(desk);
  for (const lm of MAP.landmarks) drawLandmark(lm);
}

// ── Legend ────────────────────────────────────────────────────────────────────
const legEl = document.getElementById("leg-items");
for (const [name, colour] of Object.entries(COLOURS)) {
  const row = document.createElement("div");
  row.className = "lrow";
  row.innerHTML = `<div class="dot" style="background:${colour}"></div>${name}`;
  legEl.appendChild(row);
}

// ── Tooltip on hover ──────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");

function tooltipHTML(hit) {
  if (!hit) return "";
  const { kind, item } = hit;
  const row = (label, val) => val != null
    ? `<tr><td style="color:#999;padding-right:10px">${label}</td><td>${val}</td></tr>`
    : "";
  let rows = "";
  if (kind === "desk") {
    rows = row("name", `<b>${item.name}</b>`) +
           row("id", `<code style="font-size:10px">${item.id}</code>`) +
           row("neighbourhood", item.neighborhood) +
           row("coords", `${item.x}, ${item.y}`);
  } else if (kind === "pod") {
    rows = row("type", "<b>Pod</b>") +
           row("id", `<code style="font-size:10px">${item.id}</code>`) +
           row("coords", `${item.x}, ${item.y}`);
  } else if (kind === "unavailable") {
    rows = row("type", "<b>Unavailable space</b>") +
           row("shape", item.shape) +
           row("coords", `${item.x}, ${item.y}`);
  } else if (kind === "landmark") {
    rows = row("type", `<b>${item.type}</b>`) +
           row("coords", `${item.x}, ${item.y}`);
  } else if (kind === "wall") {
    rows = row("type", "<b>Wall</b>") +
           row("id", `<code style="font-size:10px">${item.id}</code>`) +
           row("points", item.points.length);
  }
  return `<table style="border-collapse:collapse">${rows}</table>`;
}

canvas.addEventListener("mousemove", e => {
  if (isDragging) return;
  const mx = (e.clientX - ox) / scale;
  const my = (e.clientY - oy) / scale;
  const hit = hitTest(mx, my);

  if (hit !== hovered) {
    hovered = hit;
    draw();
  }

  if (hit) {
    tooltip.style.display = "block";
    tooltip.style.left = (e.clientX + 14) + "px";
    tooltip.style.top  = (e.clientY - 10) + "px";
    tooltip.innerHTML  = tooltipHTML(hit);
  } else {
    tooltip.style.display = "none";
  }
});

canvas.addEventListener("mouseleave", () => {
  tooltip.style.display = "none";
  hovered = null;
  draw();
});

// ── Pan ───────────────────────────────────────────────────────────────────────
let isDragging = false, lastX, lastY;

canvas.addEventListener("mousedown", e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
  canvas.classList.add("dragging");
});
window.addEventListener("mouseup", () => {
  isDragging = false;
  canvas.classList.remove("dragging");
});
window.addEventListener("mousemove", e => {
  if (!isDragging) return;
  ox += e.clientX - lastX;
  oy += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  draw();
});

// ── Zoom ──────────────────────────────────────────────────────────────────────
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const mx = e.clientX, my = e.clientY;
  ox = mx - (mx - ox) * factor;
  oy = my - (my - oy) * factor;
  scale *= factor;
  draw();
}, { passive: false });

// ── Init ──────────────────────────────────────────────────────────────────────
fitToWindow();
resize();
</script>
